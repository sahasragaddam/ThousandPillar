<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Colorful Content Creator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:25px;
transition:.4s;
}

.container{
background:white;
width:900px;
max-width:100%;
padding:25px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

h1{
text-align:center;
margin-bottom:20px;
color:#444;
}

textarea{
width:100%;
height:320px;
padding:15px;
border:none;
outline:none;
resize:none;
background:#f4f6fb;
border-radius:12px;
font-size:17px;
line-height:1.6;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:12px;
font-weight:bold;
color:#666;
}

.buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:25px;
}

button{
padding:14px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
transition:.3s;
color:white;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 8px 18px rgba(0,0,0,.25);
}

.copy{
background:#00b894;
}

.clear{
background:#d63031;
}

.download{
background:#0984e3;
}

.capitalize{
background:#6c5ce7;
}

.lower{
background:#e17055;
}

.dark{
background:#2d3436;
}

body.darkmode{
background:#121212;
}

body.darkmode .container{
background:#1f1f1f;
}

body.darkmode h1,
body.darkmode .stats{
color:white;
}

body.darkmode textarea{
background:#333;
color:white;
}

footer{
margin-top:20px;
text-align:center;
color:#888;
font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<h1>✨ Content Creator Studio</h1>

<textarea id="text"
placeholder="Start writing amazing content..."></textarea>

<div class="stats">
<div>Words: <span id="words">0</span></div>
<div>Characters: <span id="chars">0</span></div>
</div>

<div class="buttons">

<button class="copy" onclick="copyText()">
📋 Copy
</button>

<button class="clear" onclick="clearText()">
🗑 Clear
</button>

<button class="download" onclick="downloadText()">
💾 Download
</button>

<button class="capitalize" onclick="capitalizeText()">
🔠 UPPERCASE
</button>

<button class="lower" onclick="lowercaseText()">
🔡 lowercase
</button>

<button class="dark" onclick="toggleDark()">
🌙 Dark Mode
</button>

</div>

<footer>
Made with ❤️ in a Single HTML File
</footer>

</div>

<script>

const txt=document.getElementById("text");

txt.addEventListener("input",update);

function update(){

let words=txt.value.trim().split(/\s+/);

if(txt.value.trim()=="") words=[];

document.getElementById("words").innerHTML=words.length;

document.getElementById("chars").innerHTML=txt.value.length;

}

function copyText(){

txt.select();

document.execCommand("copy");

alert("Copied!");

}

function clearText(){

txt.value="";

update();

}

function downloadText(){

let blob=new Blob([txt.value],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="content.txt";

a.click();

}

function capitalizeText(){

txt.value=txt.value.toUpperCase();

update();

}

function lowercaseText(){

txt.value=txt.value.toLowerCase();

update();

}

function toggleDark(){

document.body.classList.toggle("darkmode");

}

</script>

</body>
</html>
